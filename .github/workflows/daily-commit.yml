name: Daily Green Commit

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Make natural commits
        run: |
          git config --global user.email "javariaazeemkhan478@gmail.com"
          git config --global user.name "javariaazeemkhan478-crypto"
          
          messages=(
            "Fix responsive layout issue"
            "Update product card styling"
            "Improve navbar performance"
            "Add loading states"
            "Fix cart total calculation"
            "Update footer links"
            "Improve mobile menu"
            "Fix search functionality"
            "Update color variables"
            "Refactor product grid"
          )
          
          for i in {0..9}; do
            echo "${messages[$i]} - $(date)" >> changelog.md
            git add changelog.md
            git commit -m "${messages[$i]}"
            sleep $((RANDOM % 30 + 5))
          done
          git push
